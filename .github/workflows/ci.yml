name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit high severity dependencies
        run: npm audit --audit-level=high

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build generated JSON
        run: npm run build

      - name: Rerun cavaquinho tests after build
        run: npm test -- --runInBand src/db/cavaquinho.test.js src/db/cavaquinho.6.test.js src/db/cavaquinho.dim.test.js src/db/cavaquinho.dim7.test.js src/db/cavaquinho.m7b5.test.js src/db/cavaquinho.sus4.test.js src/db/cavaquinho.suffix-contract.test.js

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: chords-db-coverage
          path: coverage
